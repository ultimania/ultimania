  <circle class="ringpath" cx="470" cy="470" r="210" stroke="#22d3ee" stroke-opacity=".28"/>
  <circle class="ringpath" cx="470" cy="470" r="290" stroke="#a78bfa" stroke-opacity=".26"/>
  <circle class="ringpath" cx="470" cy="470" r="370" stroke="#eef2f8" stroke-opacity=".16"/>

