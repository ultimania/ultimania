<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 940 940" font-family="'SF Mono','Cascadia Code','JetBrains Mono',Menlo,Consolas,monospace" role="img" aria-label="Skill constellation: security, cloud, AI and agents, languages">
  <defs>
    <radialGradient id="coreGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity=".38"/>
      <stop offset="60%" stop-color="#a78bfa" stop-opacity=".16"/>
      <stop offset="100%" stop-color="#a78bfa" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="coreText" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="55%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#f472b6"/>
    </linearGradient>
    <style>
      text{user-select:none;}
      .ringpath{fill:none;stroke-dasharray:2 7;stroke-linecap:round;}
      .ringA{transform-box:view-box;transform-origin:470px 470px;animation:spinCW 46s linear infinite;}
      .ringB{transform-box:view-box;transform-origin:470px 470px;animation:spinCCW 62s linear infinite;}
      .ringC{transform-box:view-box;transform-origin:470px 470px;animation:spinCW 78s linear infinite;}
      .ringD{transform-box:view-box;transform-origin:470px 470px;animation:spinCCW 100s linear infinite;}
      @keyframes spinCW{from{transform:rotate(0deg);}to{transform:rotate(360deg);}}
      @keyframes spinCCW{from{transform:rotate(0deg);}to{transform:rotate(-360deg);}}
      .counter-a{transform-box:fill-box;transform-origin:center;animation:spinCCW 46s linear infinite;}
      .counter-b{transform-box:fill-box;transform-origin:center;animation:spinCW 62s linear infinite;}
      .counter-c{transform-box:fill-box;transform-origin:center;animation:spinCCW 78s linear infinite;}
      .counter-d{transform-box:fill-box;transform-origin:center;animation:spinCW 100s linear infinite;}
      .core-pulse{animation:pulse 3.4s ease-in-out infinite;transform-box:fill-box;transform-origin:center;}
      @keyframes pulse{0%,100%{opacity:.75;transform:scale(1);}50%{opacity:1;transform:scale(1.045);}}
      @media (prefers-reduced-motion: reduce){
        .ringA,.ringB,.ringC,.ringD,.counter-a,.counter-b,.counter-c,.counter-d,.core-pulse{animation:none;}
      }
    </style>
  </defs>

  <rect width="940" height="940" fill="#04050a"/>
  <circle cx="470" cy="470" r="410" fill="url(#coreGlow)"/>

  <!-- static orbit guide rings -->
