<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 940 260" font-family="'SF Mono','Cascadia Code','JetBrains Mono',Menlo,Consolas,monospace" role="img" aria-label="Timeline of first public repository per language">
  <defs>
    <style>
      .pulse{animation:blink 2.6s ease-in-out infinite;}
      @keyframes blink{0%,100%{opacity:.5;}50%{opacity:1;}}
      .stat{opacity:0;animation:rise .6s cubic-bezier(.16,1,.3,1) forwards;}
      @keyframes rise{from{opacity:0;}to{opacity:1;}}
      @media (prefers-reduced-motion: reduce){.pulse,.stat{animation:none;opacity:1;}}
    </style>
    <linearGradient id="tlLine" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" stop-color="#22d3ee"/><stop offset="55%" stop-color="#a78bfa"/><stop offset="100%" stop-color="#f472b6"/></linearGradient>
  </defs>
  <rect width="940" height="260" rx="14" fill="#04050a"/>
  <rect x=".5" y=".5" width="939" height="259" rx="14" fill="none" stroke="#ffffff" stroke-opacity=".08"/>
  <circle class="pulse" cx="884" cy="20" r="4" fill="#22d3ee"/>
  <text x="866" y="25" text-anchor="end" font-size="10.5" letter-spacing="1.2" fill="#8e99ad">GITHUB API</text>

  <text x="30" y="42" font-size="19" font-weight="800" fill="#eef2f8">8 languages. Each one, a dated first commit.</text>
  <text x="30" y="64" font-size="13" fill="#8e99ad">Not a claim on a resume — the creation date of my first public repo in that language.</text>
  <line x1="70" y1="150" x2="870" y2="150" stroke="url(#tlLine)" stroke-width="2" opacity=".55"/>

  <g transform="translate(90.0 150)">
    <g class="stat" style="animation-delay:0.00s">
      <text y="-16" text-anchor="middle" font-size="13" font-weight="700" fill="#eef2f8">Java</text>
      <circle r="6" fill="#22d3ee"/>
      <text y="28" text-anchor="middle" font-size="12" fill="#8e99ad">2016</text>
    </g>
  </g>

  <g transform="translate(242.0 150)">
    <g class="stat" style="animation-delay:0.15s">
      <text y="-52" text-anchor="middle" font-size="13" font-weight="700" fill="#eef2f8">Python</text><text y="-34" text-anchor="middle" font-size="13" font-weight="700" fill="#eef2f8">Ruby</text><text y="-16" text-anchor="middle" font-size="13" font-weight="700" fill="#eef2f8">Dockerfile</text>
      <circle r="6" fill="#a78bfa"/>
      <text y="28" text-anchor="middle" font-size="12" fill="#8e99ad">2018</text>
    </g>
  </g>

  <g transform="translate(394.0 150)">
    <g class="stat" style="animation-delay:0.30s">
      <text y="-16" text-anchor="middle" font-size="13" font-weight="700" fill="#eef2f8">JavaScript</text>
      <circle r="6" fill="#f472b6"/>
      <text y="28" text-anchor="middle" font-size="12" fill="#8e99ad">2020</text>
    </g>
  </g>

  <g transform="translate(546.0 150)">
    <g class="stat" style="animation-delay:0.45s">
      <text y="-16" text-anchor="middle" font-size="13" font-weight="700" fill="#eef2f8">TypeScript</text>
      <circle r="6" fill="#22d3ee"/>
      <text y="28" text-anchor="middle" font-size="12" fill="#8e99ad">2023</text>
    </g>
  </g>

  <g transform="translate(698.0 150)">
    <g class="stat" style="animation-delay:0.60s">
      <text y="-16" text-anchor="middle" font-size="13" font-weight="700" fill="#eef2f8">Lua</text>
      <circle r="6" fill="#a78bfa"/>
      <text y="28" text-anchor="middle" font-size="12" fill="#8e99ad">2025</text>
    </g>
  </g>

  <g transform="translate(850.0 150)">
    <g class="stat" style="animation-delay:0.75s">
      <text y="-16" text-anchor="middle" font-size="13" font-weight="700" fill="#eef2f8">PHP</text>
      <circle r="6" fill="#f472b6"/>
      <text y="28" text-anchor="middle" font-size="12" fill="#8e99ad">2026</text>
    </g>
  </g>
  <text x="30" y="222" font-size="12.5" fill="#8e99ad">10 years, 8 languages — new stack, new repo, every time the work called for it.</text>
  <text x="30" y="242" font-size="11.5" fill="#5b6577">github.com/ultimania · public repos, earliest creation date per language · refreshed daily</text>
</svg>
