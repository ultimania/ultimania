<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 940 560" font-family="'SF Mono','Cascadia Code','JetBrains Mono',Menlo,Consolas,monospace" role="img" aria-label="Public repositories by primary language">
  <defs>
    <style>
      .bar{transform-box:fill-box;transform-origin:left center;animation:grow 1.1s cubic-bezier(.16,1,.3,1) both;}
      @keyframes grow{from{transform:scaleX(0);opacity:0;}to{transform:scaleX(1);opacity:.85;}}
      .pulse{animation:blink 2.6s ease-in-out infinite;}
      @keyframes blink{0%,100%{opacity:.5;}50%{opacity:1;}}
      @media (prefers-reduced-motion: reduce){.bar{animation:none;transform:scaleX(1);opacity:.85;} .pulse{animation:none;}}
    </style>
  </defs>
  <rect width="940" height="560" rx="14" fill="#04050a"/>
  <rect x=".5" y=".5" width="939" height="559" rx="14" fill="none" stroke="#ffffff" stroke-opacity=".08"/>

  <circle class="pulse" cx="884" cy="40" r="4" fill="#22d3ee"/>
  <text x="866" y="45" text-anchor="end" font-size="11" letter-spacing="1.5" fill="#8e99ad">LIVE FROM GITHUB API</text>

  <text x="40" y="46" font-size="21" font-weight="800" letter-spacing=".5" fill="#eef2f8">Public repos, by primary language</text>
  <text x="40" y="70" font-size="13" fill="#8e99ad">16 language-detected repos of 19 public · counted by GitHub's own per-repo "primary language" field</text>


    <text x="180" y="117" text-anchor="end" font-size="16" font-weight="600" fill="#eef2f8">Python</text>
