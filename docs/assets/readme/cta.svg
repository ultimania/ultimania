<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 340 56" role="img" aria-label="Enter the full portfolio">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
    <style>
      .glow{animation:glow 2.8s ease-in-out infinite;}
      @keyframes glow{0%,100%{opacity:.35;}50%{opacity:.8;}}
      .arrow{animation:nudge 1.6s ease-in-out infinite;}
      @keyframes nudge{0%,100%{transform:translateX(0);}50%{transform:translateX(5px);}}
      @media (prefers-reduced-motion: reduce){.glow,.arrow{animation:none;}}
    </style>
  </defs>
  <rect class="glow" x="2" y="2" width="336" height="52" rx="14" fill="url(#g)" opacity=".5"/>
  <rect x="5" y="5" width="330" height="46" rx="11" fill="url(#g)"/>
  <text x="158" y="34" text-anchor="middle" font-family="'SF Mono','Cascadia Code',Menlo,Consolas,monospace"
        font-size="16" font-weight="700" fill="#04101c" letter-spacing="1">ENTER THE FULL PORTFOLIO</text>
  <g class="arrow"><text x="298" y="35" font-family="'SF Mono',Menlo,Consolas,monospace" font-size="18" font-weight="700" fill="#04101c">→</text></g>
</svg>
