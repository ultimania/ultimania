<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 940 320" font-family="'SF Mono','Cascadia Code','JetBrains Mono',Menlo,Consolas,monospace" role="img" aria-label="One year of GitHub activity, distilled — not a calendar grid">
  <defs>
    <style>
      .pulse{animation:blink 2.6s ease-in-out infinite;}
      @keyframes blink{0%,100%{opacity:.5;}50%{opacity:1;}}
      .stat{opacity:0;animation:rise .6s cubic-bezier(.16,1,.3,1) forwards;}
      @keyframes rise{from{opacity:0;}to{opacity:1;}}
      @media (prefers-reduced-motion: reduce){.pulse,.stat{animation:none;opacity:1;}}
    </style>
    <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#22d3ee"/><stop offset="100%" stop-color="#a78bfa"/></linearGradient>
    <style>
      .ring{stroke-dasharray:578.05;stroke-dashoffset:578.05;animation:draw 1.4s cubic-bezier(.16,1,.3,1) .2s forwards;}
      @keyframes draw{to{stroke-dashoffset:325.15;}}
      @media (prefers-reduced-motion: reduce){.ring{animation:none;stroke-dashoffset:325.15;}}
    </style>
  </defs>
  <rect width="940" height="320" rx="14" fill="#04050a"/>
  <rect x=".5" y=".5" width="939" height="319" rx="14" fill="none" stroke="#ffffff" stroke-opacity=".08"/>
  <circle class="pulse" cx="884" cy="20" r="4" fill="#22d3ee"/>
  <text x="866" y="25" text-anchor="end" font-size="10.5" letter-spacing="1.2" fill="#8e99ad">GITHUB API</text>

  <text x="30" y="42" font-size="19" font-weight="800" fill="#eef2f8">Not a calendar grid — the numbers behind it</text>
  <text x="30" y="64" font-size="13" fill="#8e99ad">GitHub already shows you the green squares. Here's what they add up to.</text>

  <g transform="translate(150 195)">
    <circle r="92" fill="none" stroke="#ffffff" stroke-opacity=".08" stroke-width="14"/>
    <circle class="ring" r="92" fill="none" stroke="url(#ringGrad)" stroke-width="14" stroke-linecap="round" transform="rotate(-90)"/>
    <text text-anchor="middle" y="-4" font-size="34" font-weight="800" fill="#eef2f8">44%</text>
    <text text-anchor="middle" y="20" font-size="12" fill="#8e99ad">of days shipped</text>
    <text text-anchor="middle" y="38" font-size="11" fill="#5b6577">161 / 368 days</text>
  </g>

  <g transform="translate(400 130)"><g class="stat" style="animation-delay:.1s">
    <text font-size="34" font-weight="800" fill="#22d3ee">5,124</text>
    <text y="24" font-size="12.5" fill="#8e99ad">contributions, past 12 months</text>
  </g></g>

  <g transform="translate(400 200)"><g class="stat" style="animation-delay:.22s">
    <text font-size="34" font-weight="800" fill="#a78bfa">35</text>
    <text y="24" font-size="12.5" fill="#8e99ad">longest streak, in days</text>
  </g></g>

  <g transform="translate(650 130)"><g class="stat" style="animation-delay:.34s">
    <text font-size="34" font-weight="800" fill="#f472b6">19</text>
    <text y="24" font-size="12.5" fill="#8e99ad">public repositories</text>
  </g></g>

  <g transform="translate(650 200)"><g class="stat" style="animation-delay:.46s">
    <text font-size="34" font-weight="800" fill="#eef2f8">9 yrs</text>
    <text y="24" font-size="12.5" fill="#8e99ad">on GitHub</text>
  </g></g>

  <text x="30" y="300" font-size="11.5" fill="#5b6577">github.com/ultimania · contributionsCollection via GitHub GraphQL API · refreshed daily</text>
</svg>
