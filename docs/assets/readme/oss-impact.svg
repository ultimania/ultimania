<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 940 220" font-family="'SF Mono','Cascadia Code','JetBrains Mono',Menlo,Consolas,monospace" role="img" aria-label="redmine_budget OSS plugin real-world impact statistics">
  <defs>
    <style>
      .pulse{animation:blink 2.6s ease-in-out infinite;}
      @keyframes blink{0%,100%{opacity:.5;}50%{opacity:1;}}
      .stat{opacity:0;animation:rise .6s cubic-bezier(.16,1,.3,1) forwards;}
      @keyframes rise{from{opacity:0;}to{opacity:1;}}
      @media (prefers-reduced-motion: reduce){.pulse,.stat{animation:none;opacity:1;}}
    </style>
    
  </defs>
  <rect width="940" height="220" rx="14" fill="#04050a"/>
  <rect x=".5" y=".5" width="939" height="219" rx="14" fill="none" stroke="#ffffff" stroke-opacity=".08"/>
  <circle class="pulse" cx="884" cy="20" r="4" fill="#22d3ee"/>
  <text x="866" y="25" text-anchor="end" font-size="10.5" letter-spacing="1.2" fill="#8e99ad">GITHUB API</text>

  <text x="30" y="42" font-size="19" font-weight="800" fill="#eef2f8">redmine_budget — shipped, and other people use it</text>
  <text x="30" y="64" font-size="13" fill="#8e99ad">A public Redmine plugin, live since 2024-02. No marketing budget, no team — just usage.</text>

  <g transform="translate(30 100)"><g class="stat" style="animation-delay:.05s">
    <text font-size="34" font-weight="800" fill="#22d3ee">10</text>
    <text y="24" font-size="12.5" fill="#8e99ad">issues filed by users</text>
  </g></g>

  <g transform="translate(260 100)"><g class="stat" style="animation-delay:.18s">
    <text font-size="34" font-weight="800" fill="#a78bfa">6</text>
    <text y="24" font-size="12.5" fill="#8e99ad">resolved and closed</text>
  </g></g>

  <g transform="translate(480 100)"><g class="stat" style="animation-delay:.31s">
    <text font-size="34" font-weight="800" fill="#f472b6">1★</text>
    <text y="24" font-size="12.5" fill="#8e99ad">stargazer, zero outreach</text>
  </g></g>

  <g transform="translate(710 100)"><g class="stat" style="animation-delay:.44s">
    <text font-size="34" font-weight="800" fill="#eef2f8">2.4+ yrs</text>
    <text y="24" font-size="12.5" fill="#8e99ad">Redmine 5.1.1+</text>
  </g></g>

  <text x="30" y="182" font-size="12.5" fill="#8e99ad">Stars are vanity. Strangers filing 10 issues against your code — and 6 getting fixed — is not.</text>
  <text x="30" y="202" font-size="11.5" fill="#5b6577">github.com/ultimania/redmine_budget · issues API, all-time · refreshed daily</text>
</svg>
